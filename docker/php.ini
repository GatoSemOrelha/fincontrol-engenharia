; ============================================================
; FinControl — PHP Custom Configuration
; Otimizações para Laravel em container Docker
; ============================================================

; Uploads e memória
upload_max_filesize = 10M
post_max_size = 12M
memory_limit = 256M
max_execution_time = 60

; Timezone Brasil
date.timezone = America/Sao_Paulo

; Erros (modo desenvolvimento)
display_errors = On
error_reporting = E_ALL

; Opcache (performance)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
